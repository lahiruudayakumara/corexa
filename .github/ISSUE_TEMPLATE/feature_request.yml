name: Feature request
description: Propose a new product or platform capability
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Which developer workflow or platform gap should Corexa address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed capability
      description: Describe the desired behavior, UX, or architecture change
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Privacy, performance, compatibility, or enterprise considerations
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives or workarounds exist today, and why are they insufficient?

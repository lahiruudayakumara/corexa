name: Bug report
description: Report a defect in Corexa
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Corexa version, model provider, and workspace details
  - type: textarea
    id: logs
    attributes:
      label: Logs or traces
      description: Paste relevant logs, stack traces, or screenshots

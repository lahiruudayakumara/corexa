name: Documentation improvement
description: Suggest an improvement or report a gap in the docs
title: "[Docs] "
labels: ["documentation"]
body:
  - type: textarea
    id: page
    attributes:
      label: Affected page or area
      description: Which document, section, or workflow is confusing or missing?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Current problem
      description: What is hard to understand, inaccurate, or incomplete?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: What would make the documentation better?

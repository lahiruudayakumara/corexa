name: Documentation improvement
description: Suggest a documentation fix, gap, or onboarding improvement
title: "[Docs] "
labels: ["documentation", "triage"]
body:
  - type: dropdown
    id: audience
    attributes:
      label: Audience
      options:
        - New contributor
        - Maintainer
        - Plugin author
        - Enterprise evaluator
        - End user
        - Other
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Documentation area
      options:
        - README
        - Contribution guide
        - Architecture docs
        - Development setup
        - Testing and release docs
        - Security and governance
        - Product roadmap and milestones
        - API or SDK docs
        - Other
    validations:
      required: true
  - type: textarea
    id: page
    attributes:
      label: Affected page or area
      description: Which document, section, or workflow is confusing, incorrect, or missing?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Current problem
      description: What is inaccurate, incomplete, confusing, or hard to follow?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: What should change to make the docs more useful?
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples or references
      description: Paste examples, screenshots, terminal output, or links that would help improve the docs.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: corexa-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: corexa-runtime
  template:
    metadata:
      labels:
        app: corexa-runtime
    spec:
      containers:
        - name: runtime
          image: ghcr.io/corexa/corexa-runtime:latest
          ports:
            - containerPort: 7777
          env:
            - name: COREXA_RUNTIME_PORT
              value: "7777"
